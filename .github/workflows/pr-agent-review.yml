name: PR-Agent Ollama Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  review:
    runs-on: [self-hosted, ollama-local]
    steps:
      - name: Run PR-Agent review (Ollama)
        shell: powershell
        env:
          GITHUB__USER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG__MODEL: "ollama/qwen3-coder:30b"
          CONFIG__FALLBACK_MODELS: '["ollama/qwen2.5-coder:7b"]'
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "8000"
          CONFIG__AI_TIMEOUT: "600"
          OLLAMA__API_BASE: "http://localhost:11434"
        run: |
          C:\Users\happy\pr-agent-env\Scripts\python.exe -m pr_agent.cli --pr_url="${{ github.event.pull_request.html_url }}" review
